<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    .columns { display: grid; grid-template-columns: 1fr 1fr; }
    .toolbar { position: fixed; top: 0; }
    body { overflow: hidden; }
  </style>
</head>
<body>
  <h1>Resume</h1>
  <img src="portrait.png" alt="Candidate portrait">
  <svg aria-label="Decorative mark"><text>Hidden name</text></svg>
  <table><tr><td>Experience</td></tr></table>
  <div class="columns toolbar">Candidate</div>
  <section><p>Section without a heading</p></section>
</body>
</html>
